<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EUR/USD Signal Monitor</title>
<style>
  :root{
    --bg:#0a0e14;
    --panel:#111721;
    --panel-2:#0d131c;
    --line:#1e2935;
    --ink:#e6edf3;
    --muted:#7d8da1;
    --buy:#3fb950;
    --sell:#f85149;
    --accent:#d4a017;
    --grid:#16202c;
    --mono:"SFMono-Regular",ui-monospace,"Cascadia Code","JetBrains Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--mono);
    font-size:14px;line-height:1.5;padding:24px;
    max-width:1180px;margin:0 auto;-webkit-font-smoothing:antialiased;
  }
  a{color:var(--accent)}

  /* Header */
  header{
    display:flex;align-items:baseline;justify-content:space-between;
    flex-wrap:wrap;gap:8px 24px;
    border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:24px;
  }
  .brand{display:flex;align-items:baseline;gap:14px}
  .pair{font-size:26px;font-weight:700;letter-spacing:.5px}
  .pair .slash{color:var(--accent)}
  .tag{
    font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);
    border:1px solid var(--line);padding:3px 8px;border-radius:3px;
  }
  .updated{font-size:12px;color:var(--muted)}
  .pair-select{
    background:var(--panel);color:var(--ink);font-family:var(--mono);
    font-size:13px;border:1px solid var(--line);border-radius:4px;
    padding:5px 10px;cursor:pointer;outline:none;
  }
  .pair-select:hover{border-color:var(--accent)}
  .dot{
    display:inline-block;width:7px;height:7px;border-radius:50%;
    background:var(--accent);margin-right:6px;box-shadow:0 0 8px var(--accent);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  /* Stat rows */
  .stats{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:1px;background:var(--line);border:1px solid var(--line);
    border-radius:6px;overflow:hidden;margin-bottom:24px;
  }
  .stat{background:var(--panel);padding:16px 18px}
  .stat .label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .stat .value{font-size:24px;font-weight:700;letter-spacing:.5px}
  .stat .value.win{color:var(--buy)}
  .stat .value.loss{color:var(--sell)}
  .stat .value.pos{color:var(--buy)}
  .stat .value.neg{color:var(--sell)}
  .stat .sublabel{font-size:11px;color:var(--muted);margin-top:3px}

  /* Section */
  section{margin-bottom:28px}
  h2{
    font-size:12px;letter-spacing:2px;text-transform:uppercase;
    color:var(--muted);font-weight:600;margin-bottom:12px;
    display:flex;align-items:center;gap:10px;
  }
  h2::after{content:"";flex:1;height:1px;background:var(--line)}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:18px}

  /* Charts */
  canvas.chart{width:100%;height:200px;display:block}
  .empty{color:var(--muted);font-size:13px;padding:30px 0;text-align:center}

  /* Weights */
  .weights{display:flex;flex-direction:column;gap:10px}
  .wrow{display:grid;grid-template-columns:110px 1fr 48px;align-items:center;gap:12px}
  .wname{font-size:13px;color:var(--ink)}
  .wbar-track{background:var(--panel-2);border:1px solid var(--line);height:14px;border-radius:3px;overflow:hidden}
  .wbar-fill{height:100%;background:linear-gradient(90deg,#8a6d10,var(--accent));border-radius:2px 0 0 2px;transition:width .4s}
  .wval{font-size:12px;color:var(--muted);text-align:right}

  /* Table */
  .table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:6px}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:820px}
  thead th{
    background:var(--panel-2);text-align:left;padding:10px 14px;
    font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);
    border-bottom:1px solid var(--line);position:sticky;top:0;
  }
  tbody td{padding:11px 14px;border-bottom:1px solid var(--grid)}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:var(--panel-2)}
  .pill{
    display:inline-block;font-size:11px;font-weight:700;letter-spacing:.5px;
    padding:2px 9px;border-radius:3px;
  }
  .pill.BUY{color:var(--buy);background:rgba(63,185,80,.12);border:1px solid rgba(63,185,80,.3)}
  .pill.SELL{color:var(--sell);background:rgba(248,81,73,.12);border:1px solid rgba(248,81,73,.3)}
  .pill.WIN{color:var(--buy);background:rgba(63,185,80,.12);border:1px solid rgba(63,185,80,.3)}
  .pill.LOSS{color:var(--sell);background:rgba(248,81,73,.12);border:1px solid rgba(248,81,73,.3)}
  .pill.OPEN{color:var(--accent);background:rgba(212,160,23,.12);border:1px solid rgba(212,160,23,.3)}
  .lots{color:var(--accent);font-size:12px;font-weight:600}
  .num{font-variant-numeric:tabular-nums}
  .muted{color:var(--muted)}
  .contrib{font-size:11px;color:var(--muted)}
  .contrib .pos{color:var(--buy)}
  .contrib .neg{color:var(--sell)}
  .pnl-pos{color:var(--buy);font-weight:600}
  .pnl-neg{color:var(--sell);font-weight:600}

  /* Tuner badge */
  .tuner-badge{
    display:inline-block;font-size:10px;font-weight:700;
    padding:1px 6px;border-radius:3px;vertical-align:middle;
  }
  .tuner-badge.applied{
    color:var(--buy);background:rgba(63,185,80,.12);border:1px solid rgba(63,185,80,.3)
  }
  .tuner-badge.none{
    color:var(--muted);background:rgba(125,141,161,.1);border:1px solid var(--line)
  }
  .tuner-badge.early_reopt{
    color:var(--accent);background:rgba(212,160,23,.12);border:1px solid rgba(212,160,23,.3)
  }

  footer{
    margin-top:32px;padding-top:16px;border-top:1px solid var(--line);
    font-size:11px;color:var(--muted);line-height:1.7;
  }
  .err{color:var(--sell);padding:30px;text-align:center;border:1px dashed var(--line);border-radius:6px}
</style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="pair" id="pairTitle">EUR<span class="slash">/</span>USD</div>
      <span class="tag">Signal Monitor</span>
      <select id="pairSelect" class="pair-select">
        <option value="eurusd">EUR/USD</option>
        <option value="gbpusd">GBP/USD</option>
      </select>
    </div>
    <div class="updated"><span class="dot"></span><span id="updated">loading…</span></div>
  </header>

  <div id="root">
    <div class="empty">Loading data…</div>
  </div>

  <!-- Tuner section loads from performance_log.json independently -->
  <div id="tunerSection"></div>

  <footer>
    Auto-generated technical signals for education only — not financial advice.
    Signals are designed for MetaTrader 5 demo accounts. Win/loss is measured by whether TP or SL is reached first.
  </footer>

<script>
const fmt  = n => (n===null||n===undefined) ? "—" : Number(n).toFixed(5);
const fmtD = n => (n===null||n===undefined) ? "—" : "$"+Math.abs(Number(n)).toFixed(2);
const esc  = s => String(s).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

function timeAgo(iso){
  if(!iso) return "—";
  const d=new Date(iso), now=new Date(), s=Math.floor((now-d)/1000);
  if(s<60) return s+"s ago";
  if(s<3600) return Math.floor(s/60)+"m ago";
  if(s<86400) return Math.floor(s/3600)+"h ago";
  return Math.floor(s/86400)+"d ago";
}

/* Generic line chart: series is array of numbers */
function drawChart(canvas, series, opts){
  opts = opts||{};
  const color   = opts.color   || "#d4a017";
  const base    = opts.base;
  const prefix  = opts.prefix  || "";
  const dpr = window.devicePixelRatio||1;
  const w=canvas.clientWidth, h=canvas.clientHeight;
  canvas.width=w*dpr; canvas.height=h*dpr;
  const ctx=canvas.getContext("2d");
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);
  if(series.length<2) return;

  const pad=28;
  const mn=Math.min(...series), mx=Math.max(...series);
  const range=(mx-mn)||1;
  const xs=i=>pad+(i/(series.length-1))*(w-2*pad);
  const ys=v=>h-pad-((v-mn)/range)*(h-2*pad);

  if(base!==undefined && base>=mn && base<=mx){
    ctx.strokeStyle="#1e2935"; ctx.lineWidth=1; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(pad,ys(base)); ctx.lineTo(w-pad,ys(base)); ctx.stroke();
    ctx.setLineDash([]);
  }

  const lastVal = series[series.length-1];
  const fillColor = opts.dynamicColor
    ? (lastVal >= (base||mn) ? "rgba(63,185,80,.18)" : "rgba(248,81,73,.18)")
    : "rgba(212,160,23,.20)";
  const lineColor = opts.dynamicColor
    ? (lastVal >= (base||mn) ? "#3fb950" : "#f85149")
    : color;

  const grad=ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0, fillColor);
  grad.addColorStop(1,"rgba(0,0,0,0)");
  ctx.beginPath();
  series.forEach((v,i)=>{ i?ctx.lineTo(xs(i),ys(v)):ctx.moveTo(xs(i),ys(v)); });
  ctx.lineTo(xs(series.length-1),ys(mn));
  ctx.lineTo(xs(0),ys(mn));
  ctx.closePath(); ctx.fillStyle=grad; ctx.fill();

  ctx.beginPath();
  series.forEach((v,i)=>{ i?ctx.lineTo(xs(i),ys(v)):ctx.moveTo(xs(i),ys(v)); });
  ctx.strokeStyle=lineColor; ctx.lineWidth=2; ctx.lineJoin="round"; ctx.stroke();

  const lx=xs(series.length-1), ly=ys(lastVal);
  ctx.beginPath(); ctx.arc(lx,ly,3.5,0,7); ctx.fillStyle=lineColor; ctx.fill();
  ctx.fillStyle=lineColor; ctx.font="11px monospace";
  ctx.fillText(prefix+Number(lastVal).toFixed(2), lx+7, ly+4);
}

function contribHtml(c){
  const parts=Object.entries(c).filter(([,v])=>v!==0).map(([k,v])=>{
    const cls=v>0?"pos":"neg", sign=v>0?"+":"";
    return `<span class="${cls}">${esc(k)}${sign}${v}</span>`;
  });
  return parts.length?parts.join(" · "):"—";
}

function pnlHtml(pnl){
  if(pnl===null||pnl===undefined) return '<span class="muted">—</span>';
  const pos = pnl>=0;
  const sign = pos?"+":"-";
  return `<span class="${pos?'pnl-pos':'pnl-neg'}">${sign}$${Math.abs(pnl).toFixed(2)}</span>`;
}

function render(d){
  document.getElementById("updated").textContent = "updated "+timeAgo(d.updated_at);

  const s    = d.stats;
  const dm   = d.demo||{};
  const acct = d.mt5_account||{};
  const mt5T = d.mt5_trades||[];
  const weightRows=Object.entries(d.weights||{}).sort((a,b)=>b[1]-a[1]);
  const maxW=Math.max(1,...Object.values(d.weights||{}));

  const hasAcct   = acct.balance !== undefined;
  const mt5Profit = hasAcct ? (acct.profit||0) : 0;

  // ── MT5 Live Account ─────────────────────────────────────────────────────
  let html = `
  <section>
    <h2>MT5 Live Account <span class="muted" style="letter-spacing:0;text-transform:none;font-weight:400">${esc(acct.server||"MetaQuotes-Demo")} · #${esc(String(acct.login||"—"))}</span></h2>
    ${hasAcct ? `
    <div class="stats" style="margin-bottom:0">
      <div class="stat">
        <div class="label">Balance</div>
        <div class="value num">$${acct.balance.toFixed(2)}</div>
        <div class="sublabel">${esc(acct.currency||"USD")}</div>
      </div>
      <div class="stat">
        <div class="label">Equity</div>
        <div class="value num">$${acct.equity.toFixed(2)}</div>
      </div>
      <div class="stat">
        <div class="label">Floating P&amp;L</div>
        <div class="value ${mt5Profit>=0?'pos':'neg'} num">${mt5Profit>=0?'+':'-'}$${Math.abs(mt5Profit).toFixed(2)}</div>
      </div>
      <div class="stat">
        <div class="label">Free Margin</div>
        <div class="value num">$${acct.free_margin.toFixed(2)}</div>
      </div>
      <div class="stat">
        <div class="label">Leverage</div>
        <div class="value num">1:${acct.leverage||"—"}</div>
      </div>
    </div>` : `
    <div class="panel"><div class="empty">MT5 account data not available — bot not yet connected or first cycle pending.</div></div>`}
  </section>

  <!-- Signal stats -->
  <section>
    <div class="stats">
      <div class="stat"><div class="label">Total Signals</div><div class="value num">${s.total}</div></div>
      <div class="stat"><div class="label">Wins</div><div class="value win num">${s.wins}</div></div>
      <div class="stat"><div class="label">Losses</div><div class="value loss num">${s.losses}</div></div>
      <div class="stat"><div class="label">Open</div><div class="value num">${s.open}</div></div>
      <div class="stat"><div class="label">Win Rate</div><div class="value num">${s.win_rate}%</div></div>
    </div>
  </section>

  <!-- Equity curve -->
  <section>
    <h2>Equity Curve <span class="muted" style="letter-spacing:0;text-transform:none;font-weight:400">(+1 win / -1 loss, cumulative)</span></h2>
    <div class="panel">
      ${d.equity.length ? '<canvas class="chart" id="equityChart"></canvas>' : '<div class="empty">No closed signals yet — the curve appears once trades resolve.</div>'}
    </div>
  </section>

  <!-- Technique weights -->
  <section>
    <h2>Technique Weights <span class="muted" style="letter-spacing:0;text-transform:none;font-weight:400">(self-adjusting)</span></h2>
    <div class="panel weights">
      ${weightRows.length ? weightRows.map(([name,w])=>`
        <div class="wrow">
          <div class="wname">${esc(name)}</div>
          <div class="wbar-track"><div class="wbar-fill" style="width:${(w/maxW*100).toFixed(1)}%"></div></div>
          <div class="wval num">${w.toFixed(2)}</div>
        </div>`).join("") : '<div class="empty">No weights recorded yet.</div>'}
    </div>
  </section>

  <!-- MT5 Executed Trades -->
  <section>
    <h2>MT5 Executed Trades <span class="muted" style="letter-spacing:0;text-transform:none;font-weight:400">(actual orders on demo account · last 60 days)</span></h2>
    ${mt5T.length ? `
    <div class="table-wrap">
      <table style="min-width:600px">
        <thead><tr>
          <th>Time</th><th>Symbol</th><th>Side</th><th>Volume</th><th>Close Price</th><th>Profit</th><th>Comment</th>
        </tr></thead>
        <tbody>
          ${mt5T.map(t=>{
            const pos = t.profit>=0;
            return `
            <tr>
              <td class="muted">${timeAgo(t.time)}</td>
              <td class="num">${esc(t.symbol)}</td>
              <td><span class="pill ${esc(t.type)}">${esc(t.type)}</span></td>
              <td class="num lots">${t.volume}L</td>
              <td class="num">${Number(t.price).toFixed(5)}</td>
              <td class="num"><span class="${pos?'pnl-pos':'pnl-neg'}">${pos?'+':'-'}$${Math.abs(t.profit).toFixed(2)}</span></td>
              <td class="muted" style="font-size:11px">${esc(t.comment||"")}</td>
            </tr>`;}).join("")}
        </tbody>
      </table>
    </div>` : `
    <div class="panel"><div class="empty">No MT5 trades yet — they appear here after the bot places and closes orders on your demo account.</div></div>`}
  </section>

  <!-- Signal history -->
  <section>
    <h2>Signal History</h2>
    ${d.signals.length ? `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>#</th><th>Time</th><th>Side</th><th>TF</th><th>Entry</th>
          <th>SL</th><th>TP</th><th>Lots</th><th>R:R</th><th>Conf</th>
          <th>Status</th><th>Closed</th><th>P&amp;L</th><th>Balance</th><th>Reasons</th>
        </tr></thead>
        <tbody>
          ${d.signals.map(sig=>{
            const PIP=0.0001;
            const tp     = sig.tp1 || sig.tp;
            const slPips = sig.sl ? (Math.abs(sig.entry - sig.sl)/PIP).toFixed(1) : "—";
            const tpPips = tp ? (Math.abs(sig.entry - tp)/PIP).toFixed(1) : "—";
            return `
            <tr>
              <td class="muted num">${sig.id}</td>
              <td class="muted">${timeAgo(sig.created_at)}</td>
              <td><span class="pill ${sig.direction}">${sig.direction}</span></td>
              <td class="muted">${sig.timeframe||"—"}</td>
              <td class="num">${fmt(sig.entry)}</td>
              <td class="num" title="${slPips} pips">${fmt(sig.sl)}</td>
              <td class="num" title="${tpPips} pips">${tp?fmt(tp):"—"}</td>
              <td class="lots num">${sig.lot_size!=null?sig.lot_size+"L":"—"}</td>
              <td class="num muted">${sig.rr?("1:"+sig.rr):"—"}</td>
              <td class="num">${sig.confidence!=null?sig.confidence+"%":"—"}</td>
              <td><span class="pill ${sig.status}">${sig.status}</span></td>
              <td class="num muted">${sig.close_price?fmt(sig.close_price):"—"}</td>
              <td class="num">${pnlHtml(sig.pnl)}</td>
              <td class="num muted">${sig.balance_after!=null?"$"+sig.balance_after.toFixed(2):"—"}</td>
              <td class="contrib">${contribHtml(sig.contributors)}</td>
            </tr>`;}).join("")}
        </tbody>
      </table>
    </div>` : '<div class="empty">No signals yet. The bot posts here after its first qualifying setup.</div>'}
  </section>`;

  document.getElementById("root").innerHTML = html;

  // Draw equity chart
  const ecv = document.getElementById("equityChart");
  if(ecv){
    const eqSeries=[0,...d.equity];
    drawChart(ecv, eqSeries, {color:"#d4a017", base:0});
    window.addEventListener("resize", ()=>drawChart(ecv, eqSeries, {color:"#d4a017", base:0}));
  }
}

// ── Strategy Auto-Tuner log (loaded from performance_log.json) ──────────────

function badgeHtml(action){
  if(!action || action==="none") return '<span class="tuner-badge none">none</span>';
  if(action==="early_reopt")     return '<span class="tuner-badge early_reopt">reopt triggered</span>';
  if(String(action).startsWith("applied") || action===true)
                                 return '<span class="tuner-badge applied">applied</span>';
  return `<span class="tuner-badge none">${esc(String(action))}</span>`;
}

function renderTuner(log){
  const entries = (log.history||[]).slice(0,15);
  const updAt   = log.updated_at ? "updated "+timeAgo(log.updated_at) : "";

  let html = `
  <section style="margin-bottom:28px">
    <h2>Strategy Auto-Tuner <span class="muted" style="letter-spacing:0;text-transform:none;font-weight:400">${updAt}</span></h2>`;

  if(!entries.length){
    html += `<div class="panel"><div class="empty">No tuner runs yet — first daily comparison runs 24h after bot start.</div></div>`;
  } else {
    html += `
    <div class="table-wrap">
      <table style="min-width:700px">
        <thead><tr>
          <th>Date</th><th>Type</th><th>Trades</th>
          <th>Actual WR</th><th>Expected WR</th>
          <th>Actual E</th><th>Expected E</th><th>Action</th>
        </tr></thead>
        <tbody>
          ${entries.map(e=>{
            const wrOk  = e.actual_wr   != null && e.expected_wr  != null;
            const eOk   = e.actual_expectancy != null;
            const wrCls = wrOk ? (e.actual_wr >= e.expected_wr ? 'pnl-pos' : 'pnl-neg') : 'muted';
            return `
            <tr>
              <td class="muted">${esc(e.date||"—")}</td>
              <td class="muted">${esc((e.type||"").replace(/_/g," "))}</td>
              <td class="num muted">${e.n_trades!=null?e.n_trades:"—"}</td>
              <td class="num ${wrCls}">${e.actual_wr!=null?(e.actual_wr+"%"):"—"}</td>
              <td class="num muted">${e.expected_wr!=null?(e.expected_wr+"%"):"—"}</td>
              <td class="num ${eOk&&e.actual_expectancy>=0?'pnl-pos':eOk?'pnl-neg':'muted'}">${eOk?("$"+e.actual_expectancy.toFixed(2)):"—"}</td>
              <td class="num muted">${e.expected_expectancy!=null?("$"+e.expected_expectancy.toFixed(2)):"—"}</td>
              <td>${badgeHtml(e.action!=null?e.action:(e.applied!=null?e.applied:null))}</td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>`;
  }

  html += `</section>`;
  document.getElementById("tunerSection").innerHTML = html;
}

function loadTunerLog(){
  fetch("performance_log.json?_="+Date.now())
    .then(r=>{ if(!r.ok) return null; return r.json(); })
    .then(data=>{ if(data) renderTuner(data); })
    .catch(()=>{});
}

// ── Pair switching + auto-refresh ────────────────────────────────────────────

function pairLabel(slug){
  return slug.slice(0,3).toUpperCase()+"/"+slug.slice(3).toUpperCase();
}

function loadPair(slug){
  const lbl=pairLabel(slug);
  document.getElementById("pairTitle").innerHTML =
    lbl.slice(0,3)+'<span class="slash">/</span>'+lbl.slice(4);
  fetch(`data_${slug}.json?_=`+Date.now())
    .then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(render)
    .catch(()=>{
      document.getElementById("updated").textContent="no data yet";
      document.getElementById("root").innerHTML=
        `<div class="err">No data for ${lbl} yet.<br>It appears after the bot runs once for this pair and commits its results.</div>`;
    });
  loadTunerLog();
}

const sel=document.getElementById("pairSelect");
let _currentPair = sel.value;
sel.addEventListener("change",()=>{ _currentPair=sel.value; loadPair(_currentPair); });
loadPair(_currentPair);
setInterval(()=>loadPair(_currentPair), 5*60*1000);
</script>
</body>
</html>
