<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EUR/USD Signal Monitor</title>
<style>
  :root{
    --bg:#0a0e14;
    --panel:#111721;
    --panel-2:#0d131c;
    --line:#1e2935;
    --ink:#e6edf3;
    --muted:#7d8da1;
    --buy:#3fb950;
    --sell:#f85149;
    --accent:#d4a017;     /* amber — the "ticker" accent */
    --grid:#16202c;
    --mono:"SFMono-Regular",ui-monospace,"Cascadia Code","JetBrains Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--mono);
    font-size:14px;
    line-height:1.5;
    padding:24px;
    max-width:1180px;
    margin:0 auto;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--accent)}

  /* Header */
  header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px 24px;
    border-bottom:1px solid var(--line);
    padding-bottom:16px;
    margin-bottom:24px;
  }
  .brand{display:flex;align-items:baseline;gap:14px}
  .pair{
    font-size:26px;
    font-weight:700;
    letter-spacing:.5px;
  }
  .pair .slash{color:var(--accent)}
  .tag{
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--muted);
    border:1px solid var(--line);
    padding:3px 8px;
    border-radius:3px;
  }
  .updated{font-size:12px;color:var(--muted)}
  .dot{
    display:inline-block;width:7px;height:7px;border-radius:50%;
    background:var(--accent);margin-right:6px;
    box-shadow:0 0 8px var(--accent);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  /* Stat row */
  .stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:1px;
    background:var(--line);
    border:1px solid var(--line);
    border-radius:6px;
    overflow:hidden;
    margin-bottom:24px;
  }
  .stat{background:var(--panel);padding:16px 18px}
  .stat .label{
    font-size:11px;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--muted);margin-bottom:6px;
  }
  .stat .value{font-size:24px;font-weight:700;letter-spacing:.5px}
  .stat .value.win{color:var(--buy)}
  .stat .value.loss{color:var(--sell)}

  /* Section */
  section{margin-bottom:28px}
  h2{
    font-size:12px;letter-spacing:2px;text-transform:uppercase;
    color:var(--muted);font-weight:600;margin-bottom:12px;
    display:flex;align-items:center;gap:10px;
  }
  h2::after{content:"";flex:1;height:1px;background:var(--line)}

  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:6px;
    padding:18px;
  }

  /* Equity curve */
  #equity{width:100%;height:200px;display:block}
  .empty{color:var(--muted);font-size:13px;padding:30px 0;text-align:center}

  /* Weights */
  .weights{display:flex;flex-direction:column;gap:10px}
  .wrow{display:grid;grid-template-columns:96px 1fr 48px;align-items:center;gap:12px}
  .wname{font-size:13px;color:var(--ink)}
  .wbar-track{background:var(--panel-2);border:1px solid var(--line);height:14px;border-radius:3px;overflow:hidden}
  .wbar-fill{height:100%;background:linear-gradient(90deg,#8a6d10,var(--accent));border-radius:2px 0 0 2px;transition:width .4s}
  .wval{font-size:12px;color:var(--muted);text-align:right}

  /* Table */
  .table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:6px}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:720px}
  thead th{
    background:var(--panel-2);
    text-align:left;padding:10px 14px;
    font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);
    border-bottom:1px solid var(--line);
    position:sticky;top:0;
  }
  tbody td{padding:11px 14px;border-bottom:1px solid var(--grid)}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:var(--panel-2)}
  .pill{
    display:inline-block;font-size:11px;font-weight:700;letter-spacing:.5px;
    padding:2px 9px;border-radius:3px;
  }
  .pill.BUY{color:var(--buy);background:rgba(63,185,80,.12);border:1px solid rgba(63,185,80,.3)}
  .pill.SELL{color:var(--sell);background:rgba(248,81,73,.12);border:1px solid rgba(248,81,73,.3)}
  .pill.WIN{color:var(--buy);background:rgba(63,185,80,.12);border:1px solid rgba(63,185,80,.3)}
  .pill.LOSS{color:var(--sell);background:rgba(248,81,73,.12);border:1px solid rgba(248,81,73,.3)}
  .pill.OPEN{color:var(--accent);background:rgba(212,160,23,.12);border:1px solid rgba(212,160,23,.3)}
  .num{font-variant-numeric:tabular-nums}
  .muted{color:var(--muted)}
  .contrib{font-size:11px;color:var(--muted)}
  .contrib .pos{color:var(--buy)}
  .contrib .neg{color:var(--sell)}

  footer{
    margin-top:32px;padding-top:16px;border-top:1px solid var(--line);
    font-size:11px;color:var(--muted);line-height:1.7;
  }
  .err{color:var(--sell);padding:30px;text-align:center;border:1px dashed var(--line);border-radius:6px}
</style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="pair">EUR<span class="slash">/</span>USD</div>
      <span class="tag">Signal Monitor</span>
    </div>
    <div class="updated"><span class="dot"></span><span id="updated">loading…</span></div>
  </header>

  <div id="root">
    <div class="empty">Loading data…</div>
  </div>

  <footer>
    Auto-generated technical signals for education only — not financial advice. Free data may be delayed.
    Win/loss is measured by whether take-profit or stop-loss was reached first.
  </footer>

<script>
const fmt = n => (n===null||n===undefined) ? "—" : Number(n).toFixed(5);
const esc = s => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

function timeAgo(iso){
  if(!iso) return "—";
  const d = new Date(iso), now = new Date();
  const s = Math.floor((now-d)/1000);
  if(s<60) return s+"s ago";
  if(s<3600) return Math.floor(s/60)+"m ago";
  if(s<86400) return Math.floor(s/3600)+"h ago";
  return Math.floor(s/86400)+"d ago";
}

function drawEquity(canvas, data){
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth, h = canvas.clientHeight;
  canvas.width = w*dpr; canvas.height = h*dpr;
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);
  if(!data.length){ return; }

  const pad = 24;
  const series = [0, ...data];
  const min = Math.min(...series), max = Math.max(...series);
  const range = (max-min)||1;
  const xs = i => pad + (i/(series.length-1))*(w-2*pad);
  const ys = v => h-pad - ((v-min)/range)*(h-2*pad);

  // zero baseline
  ctx.strokeStyle = "#1e2935"; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(pad, ys(0)); ctx.lineTo(w-pad, ys(0)); ctx.stroke();

  // area fill
  const grad = ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0,"rgba(212,160,23,.25)");
  grad.addColorStop(1,"rgba(212,160,23,0)");
  ctx.beginPath();
  series.forEach((v,i)=>{ i?ctx.lineTo(xs(i),ys(v)):ctx.moveTo(xs(i),ys(v)); });
  ctx.lineTo(xs(series.length-1), ys(min));
  ctx.lineTo(xs(0), ys(min));
  ctx.closePath(); ctx.fillStyle = grad; ctx.fill();

  // line
  ctx.beginPath();
  series.forEach((v,i)=>{ i?ctx.lineTo(xs(i),ys(v)):ctx.moveTo(xs(i),ys(v)); });
  ctx.strokeStyle = "#d4a017"; ctx.lineWidth = 2;
  ctx.lineJoin="round"; ctx.stroke();

  // last point
  const lx = xs(series.length-1), ly = ys(series[series.length-1]);
  ctx.beginPath(); ctx.arc(lx,ly,3.5,0,7); ctx.fillStyle="#d4a017"; ctx.fill();
}

function contribHtml(c){
  const parts = Object.entries(c).filter(([,v])=>v!==0).map(([k,v])=>{
    const cls = v>0 ? "pos" : "neg";
    const sign = v>0 ? "+" : "";
    return `<span class="${cls}">${esc(k)}${sign}${v}</span>`;
  });
  return parts.length ? parts.join(" · ") : "—";
}

function render(d){
  document.getElementById("updated").textContent =
    "updated " + timeAgo(d.updated_at);

  const s = d.stats;
  const weightRows = Object.entries(d.weights).sort((a,b)=>b[1]-a[1]);
  const maxW = Math.max(1, ...Object.values(d.weights));

  let html = `
  <section>
    <div class="stats">
      <div class="stat"><div class="label">Total Signals</div><div class="value num">${s.total}</div></div>
      <div class="stat"><div class="label">Wins</div><div class="value win num">${s.wins}</div></div>
      <div class="stat"><div class="label">Losses</div><div class="value loss num">${s.losses}</div></div>
      <div class="stat"><div class="label">Open</div><div class="value num">${s.open}</div></div>
      <div class="stat"><div class="label">Win Rate</div><div class="value num">${s.win_rate}%</div></div>
    </div>
  </section>

  <section>
    <h2>Equity Curve <span class="muted" style="letter-spacing:0;text-transform:none;font-weight:400">(+1 win / −1 loss, cumulative)</span></h2>
    <div class="panel">
      ${d.equity.length ? '<canvas id="equity"></canvas>' : '<div class="empty">No closed signals yet — the curve appears once trades resolve.</div>'}
    </div>
  </section>

  <section>
    <h2>Technique Weights <span class="muted" style="letter-spacing:0;text-transform:none;font-weight:400">(self-adjusting)</span></h2>
    <div class="panel weights">
      ${weightRows.length ? weightRows.map(([name,w])=>`
        <div class="wrow">
          <div class="wname">${esc(name)}</div>
          <div class="wbar-track"><div class="wbar-fill" style="width:${(w/maxW*100).toFixed(1)}%"></div></div>
          <div class="wval num">${w.toFixed(2)}</div>
        </div>`).join("") : '<div class="empty">No weights recorded yet.</div>'}
    </div>
  </section>

  <section>
    <h2>Signal History</h2>
    ${d.signals.length ? `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>#</th><th>Time</th><th>Side</th><th>TF</th><th>Entry</th>
          <th>SL</th><th>TP1</th><th>TP2</th><th>R:R</th><th>Conf</th><th>Trend</th>
          <th>Status</th><th>Closed</th><th>Reasons</th>
        </tr></thead>
        <tbody>
          ${d.signals.map(sig=>`
            <tr>
              <td class="muted num">${sig.id}</td>
              <td class="muted">${timeAgo(sig.created_at)}</td>
              <td><span class="pill ${sig.direction}">${sig.direction}</span></td>
              <td class="muted">${sig.timeframe||"—"}</td>
              <td class="num">${fmt(sig.entry)}</td>
              <td class="num">${fmt(sig.sl)}</td>
              <td class="num">${sig.tp1?fmt(sig.tp1):fmt(sig.tp)}</td>
              <td class="num">${sig.tp2?fmt(sig.tp2):"—"}</td>
              <td class="num muted">${sig.rr?("1:"+sig.rr):"—"}</td>
              <td class="num">${sig.confidence!=null?sig.confidence+"%":"—"}</td>
              <td class="num muted">${sig.trend_strength!=null?sig.trend_strength:"—"}</td>
              <td><span class="pill ${sig.status}">${sig.status}</span></td>
              <td class="num muted">${sig.close_price?fmt(sig.close_price):"—"}</td>
              <td class="contrib">${contribHtml(sig.contributors)}</td>
            </tr>`).join("")}
        </tbody>
      </table>
    </div>` : '<div class="empty">No signals yet. The bot posts here after its first qualifying setup.</div>'}
  </section>`;

  document.getElementById("root").innerHTML = html;

  const cv = document.getElementById("equity");
  if(cv){ drawEquity(cv, d.equity); window.addEventListener("resize", ()=>drawEquity(cv,d.equity)); }
}

fetch("data.json?_=" + Date.now())
  .then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(render)
  .catch(e=>{
    document.getElementById("updated").textContent = "no data yet";
    document.getElementById("root").innerHTML =
      `<div class="err">No <code>data.json</code> found yet.<br>It appears after the bot runs once and commits its results.</div>`;
  });
</script>
</body>
</html>
