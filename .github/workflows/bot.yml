name: EURUSD Signal Bot

on:
  schedule:
    # Every 15 minutes. GitHub's smallest reliable cron interval is ~5 min,
    # but free runners are queued; 15 min is safe and avoids rate limits.
    - cron: "*/15 * * * *"
  workflow_dispatch:        # lets you run it manually from the Actions tab

# Allow the workflow to commit the updated database back to the repo
permissions:
  contents: write

# Prevent overlapping runs from racing on the DB
concurrency:
  group: signal-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python main.py

      - name: Persist database
        run: |
          git config user.name "signal-bot"
          git config user.email "bot@users.noreply.github.com"
          git add signals_*.db docs/data_*.json
          git commit -m "Update signals + dashboards [skip ci]" || echo "No changes to commit"
          git push || echo "Nothing to push"
