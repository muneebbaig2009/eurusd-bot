name: EURUSD Signal Bot

# Scheduled run removed — the bot now runs locally via MT5 terminal (run_local.py).
# MT5's Python API requires Windows named pipes and cannot run in GitHub's
# Linux ubuntu-latest runners.
#
# This workflow is kept for manual dashboard deployment if needed.
on:
  workflow_dispatch:    # manual trigger only

permissions:
  contents: write

concurrency:
  group: signal-bot
  cancel-in-progress: false

jobs:
  deploy-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify dashboard files exist
        run: |
          echo "Dashboard files in docs/:"
          ls docs/ || echo "No docs/ directory yet"
          echo "Done — no bot run needed (MT5 runs locally on Windows)"
